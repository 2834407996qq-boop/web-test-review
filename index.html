<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web 前端测试 — 复习题库</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #fff;
    --text: #1a1a2e;
    --sub: #555;
    --accent: #4f46e5;
    --accent-light: #eef2ff;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --border: #e5e7eb;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ===== Header ===== */
  .header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
    color: #fff;
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(79,70,229,.25);
  }
  .header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: .02em; }
  .header p  { margin-top: 6px; opacity: .78; font-size: .92rem; }

  /* ===== Tabs ===== */
  .subject-bar { display: flex; gap: 8px; max-width: 900px; margin: 0 auto; padding: 14px 16px 0; }
  .subj-btn { padding: 8px 20px; border: 1.5px solid var(--border); background: var(--card); font-size: .95rem; font-weight: 600; cursor: pointer; color: var(--sub); border-radius: 20px; transition: all .18s; }
  .subj-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 12px rgba(79,70,229,.3); }
  .subj-btn:hover:not(.active) { background: #f8fafc; border-color: #c4b5fd; }
  .tab-bar {
    display: flex;
    gap: 0;
    max-width: 900px;
    margin: 20px auto 0;
    padding: 0 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 8px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--sub);
    transition: all .18s;
  }
  .tab-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .tab-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    z-index: 1;
    box-shadow: 0 2px 12px rgba(79,70,229,.3);
  }
  .tab-btn:hover:not(.active) { background: #f8fafc; }

  /* ===== Main Container ===== */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 16px 60px;
  }
  .paper { display: none; }
  .paper.active { display: block; }

  /* ===== Section Title ===== */
  .section-title {
    font-size: 1.12rem;
    font-weight: 700;
    color: var(--accent);
    margin: 28px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    font-size: .78rem;
    border-radius: 20px;
    padding: 2px 12px;
    white-space: nowrap;
  }

  /* ===== Question Card ===== */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: all .25s;
  }
  .q-card.correct { border-color: var(--green); background: var(--green-bg); }
  .q-card.wrong   { border-color: var(--red);  background: var(--red-bg);  }
  .q-num {
    display: inline-block;
    width: 28px; height: 28px;
    line-height: 28px;
    text-align: center;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 6px;
    font-weight: 700;
    font-size: .82rem;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .q-card.correct .q-num { background: #bbf7d0; color: #15803d; }
  .q-card.wrong   .q-num { background: #fecaca; color: #b91c1c; }
  .q-source {
    display: inline-block;
    font-size: .72rem;
    background: #fef3c7;
    color: #92400e;
    padding: 1px 8px;
    border-radius: 10px;
    margin-left: 6px;
    font-weight: 400;
    white-space: nowrap;
  }
  .q-stem { font-weight: 600; margin-bottom: 10px; display: flex; align-items: flex-start; }

  /* ===== Options (radio) ===== */
  .options { display: flex; flex-direction: column; gap: 6px; }
  .opt-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
    font-size: .94rem;
  }
  .opt-label:hover { background: #f8fafc; }
  .opt-label input[type="radio"] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .opt-label.chosen-correct { background: #bbf7d0; border-color: var(--green); }
  .opt-label.chosen-wrong   { background: #fecaca; border-color: var(--red);  }
  .opt-label.real-answer    { background: #bbf7d0; border-color: var(--green); }

  /* ===== Fill-in-blank inputs ===== */
  .fill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .fill-row input[type="text"] {
    flex: 1;
    min-width: 120px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .94rem;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    transition: border-color .15s;
    background: #fafafa;
  }
  .fill-row input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    background: #fff;
  }
  .fill-row input[type="text"].input-correct { border-color: var(--green); background: #f0fdf4; }
  .fill-row input[type="text"].input-wrong   { border-color: var(--red);  background: #fef2f2; }
  .fill-label {
    font-size: .82rem;
    color: var(--sub);
    white-space: nowrap;
  }

  /* ===== Feedback line ===== */
  .feedback {
    margin-top: 10px;
    font-size: .88rem;
    display: none;
  }
  .q-card.checked .feedback { display: block; }
  .feedback.correct-msg { color: var(--green); }
  .feedback.wrong-msg   { color: var(--red);  }
  .exp-box {
    margin-top: 8px;
    padding: 10px 14px;
    background: #fffbeb;
    border-left: 3px solid #f59e0b;
    border-radius: 6px;
    font-size: .88rem;
    color: #78350f;
    line-height: 1.7;
  }
  .feedback .correct-answer-text {
    display: inline-block;
    background: #e0f2fe;
    color: #0369a1;
    padding: 2px 10px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: .85rem;
    margin-left: 4px;
  }

  /* ===== Submit / Score bar ===== */
  .score-bar {
    position: sticky;
    bottom: 16px;
    max-width: 900px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: 0 -2px 20px rgba(0,0,0,.08);
    flex-wrap: wrap;
  }
  .score-text { font-weight: 700; font-size: 1.05rem; }
  .score-text .big { font-size: 1.5rem; }
  .btn {
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .02em;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,70,229,.35); }
  .btn-outline { background: #fff; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: var(--accent-light); }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .header h1 { font-size: 1.3rem; }
    .q-card { padding: 14px; }
    .tab-btn { font-size: .82rem; padding: 10px 6px; }
    .score-bar { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📝 Web 前端测试 — 复习题库</h1>
  <p>多学科题库 · 单选 / 填空 / 判断 · 提交后显示对错与正确答案</p>
</div>

<div class="subject-bar" id="subjectBar"></div>
<div class="tab-bar" id="tabBar"></div>

<div class="container" id="papersContainer"></div>

<div class="score-bar" id="scoreBar">
  <div class="score-text" id="scoreText" style="display:none">得分：<span class="big" id="scoreNum">0</span> / <span id="scoreTotal">0</span></div>
  <div class="score-text" id="scoreHint" style="color:#888;font-weight:400;font-size:.9rem">📝 做完题后点击「提交」查看对错</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-outline" onclick="resetPaper()">🔄 重做</button>
    <button class="btn btn-outline" onclick="shufflePaper()">🔀 打乱顺序</button>
    <button class="btn btn-outline" id="btnWrong" onclick="scrollToWrong()" style="display:none">📍 定位错题</button>
    <button class="btn btn-primary" onclick="gradeCurrent()">✅ 提交</button>
  </div>
</div>

<script>

// ========================  DATA  ========================

const papers = [
  { subject: "Web前端", // ===== Web测试（一） =====

        { stem: "以下哪个CSS属性可以设置盒子的圆角边框？", opts: ["border-style","border-radius","box-shadow","padding"], exp: "border-radius 用于设置元素圆角，可分别指定四个角的半径。",

        { stem: "以下哪种方法<strong>不能</strong>解决嵌套块元素的外边距塌陷问题（）", opts: ["给父盒子添加上边框","给父盒子添加上内边距","给父盒子添加overflow: hidden属性","给子盒子添加float: left属性"], exp: "给子盒子加 float 不能解决外边距塌陷，反而可能引发新的布局问题。加边框、内边距、overflow:hidden 均可创建 BFC 来解决。",

        { stem: "以下关于块级盒子（block）的描述，错误的是？", opts: ["盒子会产生换行","width和height属性有效","垂直方向的内边距、外边距无效","若不设置宽度，默认是父元素空间的100%"], exp: "同第 3 题，块级盒子的垂直内边距和外边距实际上是有效的。",

// ========================  BUILD COMBINED PAPER  ========================
(function buildCombined() {
  const subjDefs = [
    { name: "Web前端", indices: [0, 1, 2], sources: ["Web测试（一）", "Web测试（二）", "Web测试（三）"] },
  ];
  subjDefs.forEach(subj => {
    const secTypes = ["单选", "填空", "判断"];
    const sourcePapers = subj.indices.map(i => papers[i]);
    const combined = { subject: subj.name, title: "综合测试（三套整合）", sections: [] };
    secTypes.forEach(type => {
      const merged = [];
      sourcePapers.forEach((p, pi) => {
        const sec = p.sections.find(s => s.type === type);
        if (sec) {
          sec.questions.forEach(q => {
            merged.push({ ...q, source: subj.sources[pi] });
          });
        }
      });
      if (merged.length > 0) {
        combined.sections.push({
          type: type,
          scoreEach: type === "单选" ? 2 : 1,
          label: (type === "单选" ? "一" : type === "填空" ? "二" : "三") + "、" + type + "题（共" + merged.length + "题）",
          questions: merged
        });
      }
    });
    papers.push(combined);
  });
})();

// ========================  GLOBALS  ========================
let currentSubject = "Web前端";
let currentPaper = 0;
let shuffleMap = {};  // { paperIdx: [{si, qi}, ...] } — null/absent = original order
let wrongCards = [];  // list of card element IDs that were wrong
let wrongIdx = 0;

function getPapersForSubject(subj) {
  return papers.filter(p => p.subject === subj);
}
function getGlobalPaperIdx(subj, localIdx) {
  const subjPapers = getPapersForSubject(subj);
  if (localIdx >= subjPapers.length) return -1;
  return papers.indexOf(subjPapers[localIdx]);
}

// ========================  RENDER  ========================

function renderAll() {
  renderSubjectBar();
  renderTabBar();
  renderContainer();
}

function renderSubjectBar() {
  const bar = document.getElementById("subjectBar");
  const subjects = [...new Set(papers.map(p => p.subject))];
  bar.innerHTML = subjects.map(s => '<button class="subj-btn' + (s === currentSubject ? ' active' : '') + '" onclick="switchSubject(\'' + s + '\')">📖 ' + s + '</button>').join("");
}

function renderTabBar() {
  const bar = document.getElementById("tabBar");
  if (!bar) return;
  const subjPapers = getPapersForSubject(currentSubject);
  bar.innerHTML = subjPapers.map((p, i) => '<button class="tab-btn' + (i === currentPaper ? ' active' : '') + '" onclick="switchPaper(' + i + ')">📋 ' + p.title + '</button>').join("");
}

function renderContainer() {
  const container = document.getElementById("papersContainer");
  container.innerHTML = papers.map((_, pi) => renderPaper(pi)).join("");
}

function renderPaper(pi) {
  const paper = papers[pi];
  let qGlobal = 0;
  const order = shuffleMap[pi]; // [{si, qi}, ...] per section if shuffled

  return `<div class="paper${pi === 0 ? ' active' : ''}" id="paper${pi}">
    ${paper.sections.map((sec, si) => {
      // Determine display order for this section
      let indices;
      if (order) {
        indices = order.filter(o => o.si === si);
      } else {
        indices = sec.questions.map((_, qi) => ({ si, qi }));
      }
      return `
        <div class="section-title">
          <span class="badge">${sec.type}题</span> ${sec.label}
        </div>
        ${indices.map(({ qi }) => {
          const q = sec.questions[qi];
          qGlobal++;
          const qid = `p${pi}_s${si}_q${qi}`;
          if (sec.type === '单选') {
            return renderChoice(qid, qGlobal, q, pi, si, qi);
          } else if (sec.type === '判断') {
            return renderTF(qid, qGlobal, q, pi, si, qi);
          } else {
            return renderFill(qid, qGlobal, q, pi, si, qi);
          }
        }).join('')}
      `;
    }).join('')}
  </div>`;
}

function renderChoice(qid, qGlobal, q, pi, si, qi) {
  const srcTag = q.source ? `<span class="q-source">${q.source}</span>` : '';
  return `<div class="q-card" id="card_${qid}" data-paper="${pi}" data-section="${si}" data-q="${qi}" data-type="choice">
    <div class="q-stem"><span class="q-num">${qGlobal}</span><span>${q.stem}${srcTag}</span></div>
    <div class="options">
      ${q.opts.map((opt, oi) => `
        <label class="opt-label" id="opt_${qid}_${oi}">
          <input type="radio" name="${qid}" value="${oi}">
          <span>${'ABCD'[oi]}. ${opt}</span>
        </label>
      `).join('')}
    </div>
    <div class="feedback" id="fb_${qid}"></div>
  </div>`;
}

function renderTF(qid, qGlobal, q, pi, si, qi) {
  const srcTag = q.source ? `<span class="q-source">${q.source}</span>` : '';
  return `<div class="q-card" id="card_${qid}" data-paper="${pi}" data-section="${si}" data-q="${qi}" data-type="tf">
    <div class="q-stem"><span class="q-num">${qGlobal}</span><span>${q.stem}${srcTag}</span></div>
    <div class="options">
      <label class="opt-label" id="opt_${qid}_0">
        <input type="radio" name="${qid}" value="true"> <span>A. 对</span>
      </label>
      <label class="opt-label" id="opt_${qid}_1">
        <input type="radio" name="${qid}" value="false"> <span>B. 错</span>
      </label>
    </div>
    <div class="feedback" id="fb_${qid}"></div>
  </div>`;
}

function renderFill(qid, qGlobal, q, pi, si, qi) {
  // Normalize: ____1____ → ____, ______ → ____
  let stem = q.stem.replace(/____\d+____/g, '____').replace(/______/g, '____');
  let blankIdx = 0;
  const stemWithInputs = stem.replace(/____/g, () => {
    const b = blankIdx++;
    return `<input type="text" class="fill-input" id="fill_${qid}_${b}" data-blank="${b}" placeholder="______">`;
  });
  const srcTag = q.source ? `<span class="q-source">${q.source}</span>` : '';
  return `<div class="q-card" id="card_${qid}" data-paper="${pi}" data-section="${si}" data-q="${qi}" data-type="fill">
    <div class="q-stem"><span class="q-num">${qGlobal}</span><span>${stemWithInputs}${srcTag}</span></div>
    <div class="feedback" id="fb_${qid}"></div>
  </div>`;
}

// ========================  GRADING  ========================

function gradeCurrent() {
  const globalIdx = getGlobalPaperIdx(currentSubject, currentPaper);
  const paper = papers[globalIdx];
  let totalScore = 0;
  let earnedScore = 0;

  paper.sections.forEach((sec, si) => {
    sec.questions.forEach((q, qi) => {
      const qid = `p${globalIdx}_s${si}_q${qi}`;
      const card = document.getElementById(`card_${qid}`);
      const fb = document.getElementById(`fb_${qid}`);
      if (!card || !fb) return;

      totalScore += sec.scoreEach;
      let isCorrect = false;
      let correctDisplay = '';

      if (sec.type === '单选') {
        const selected = document.querySelector(`input[name="${qid}"]:checked`);
        if (selected && parseInt(selected.value) === q.ans) {
          isCorrect = true;
          earnedScore += sec.scoreEach;
        }
        correctDisplay = 'ABCD'[q.ans] + '. ' + q.opts[q.ans];
        // Highlight chosen & real answer
        q.opts.forEach((_, oi) => {
          const lbl = document.getElementById(`opt_${qid}_${oi}`);
          if (lbl) lbl.classList.remove('chosen-correct','chosen-wrong','real-answer');
        });
        if (selected) {
          const selLbl = document.getElementById(`opt_${qid}_${selected.value}`);
          if (selLbl) selLbl.classList.add(isCorrect ? 'chosen-correct' : 'chosen-wrong');
        }
        if (!isCorrect) {
          const realLbl = document.getElementById(`opt_${qid}_${q.ans}`);
          if (realLbl) realLbl.classList.add('real-answer');
        }
      } else if (sec.type === '判断') {
        const selected = document.querySelector(`input[name="${qid}"]:checked`);
        const userVal = selected ? (selected.value === 'true') : null;
        if (userVal === q.ans) {
          isCorrect = true;
          earnedScore += sec.scoreEach;
        }
        correctDisplay = q.ans ? 'A. 对' : 'B. 错';
        ['0','1'].forEach(vi => {
          const lbl = document.getElementById(`opt_${qid}_${vi}`);
          if (lbl) lbl.classList.remove('chosen-correct','chosen-wrong','real-answer');
        });
        if (selected) {
          const selLbl = document.getElementById(`opt_${qid}_${selected.value === 'true' ? '0' : '1'}`);
          if (selLbl) selLbl.classList.add(isCorrect ? 'chosen-correct' : 'chosen-wrong');
        }
        if (!isCorrect) {
          const realLbl = document.getElementById(`opt_${qid}_${q.ans ? '0' : '1'}`);
          if (realLbl) realLbl.classList.add('real-answer');
        }
      } else if (sec.type === '填空') {
        // Check each blank
        let allBlanksCorrect = true;
        const correctParts = [];
        for (let b = 0; b < q.blanks; b++) {
          const input = document.getElementById(`fill_${qid}_${b}`);
          const accepted = q.ans[b] || [];
          const userAnswer = input ? input.value.trim() : '';
          const blankCorrect = accepted.some(a => userAnswer.toLowerCase() === a.toLowerCase());
          if (!blankCorrect) allBlanksCorrect = false;
          if (input) {
            input.classList.remove('input-correct','input-wrong');
            input.classList.add(blankCorrect ? 'input-correct' : 'input-wrong');
          }
          correctParts.push(accepted[0]); // show first accepted answer
        }
        if (allBlanksCorrect) {
          isCorrect = true;
          earnedScore += sec.scoreEach;
        }
        correctDisplay = correctParts.join('、');
      }

      // Update card & feedback
      card.classList.remove('correct','wrong','checked');
      card.classList.add('checked', isCorrect ? 'correct' : 'wrong');
      if (isCorrect) {
        fb.innerHTML = '✅ 回答正确！';
        fb.className = 'feedback correct-msg';
      } else {
        fb.innerHTML = `❌ 回答错误，正确答案：<span class="correct-answer-text">${correctDisplay}</span>`;
        fb.className = 'feedback wrong-msg';
      }
      if (q.exp) {
        fb.innerHTML += `<div class="exp-box">💡 ${q.exp}</div>`;
      }
      // Collect wrong cards
      if (!isCorrect) wrongCards.push(`card_${qid}`);
    });
  });

  // Show score
  document.getElementById('scoreText').style.display = 'block';
  document.getElementById('scoreHint').style.display = 'none';
  document.getElementById('scoreNum').textContent = earnedScore;
  document.getElementById('scoreTotal').textContent = totalScore;

  // Show/hide wrong-nav button
  wrongIdx = 0;
  const btnW = document.getElementById('btnWrong');
  if (wrongCards.length > 0) {
    btnW.style.display = '';
    btnW.textContent = `📍 定位错题 (1/${wrongCards.length})`;
  } else {
    btnW.style.display = 'none';
  }

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========================  SCROLL TO WRONG  ========================

function scrollToWrong() {
  if (wrongCards.length === 0) return;
  const id = wrongCards[wrongIdx];
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Highlight pulse
    el.style.boxShadow = '0 0 0 4px #f59e0b';
    setTimeout(() => { el.style.boxShadow = ''; }, 1500);
  }
  // Advance with wrap-around
  wrongIdx = (wrongIdx + 1) % wrongCards.length;
  document.getElementById('btnWrong').textContent = `📍 下一错题 (${wrongIdx + 1}/${wrongCards.length})`;
}

// ========================  RESET  ========================

function resetPaper() {
  const globalIdx = getGlobalPaperIdx(currentSubject, currentPaper);
  delete shuffleMap[globalIdx];
  wrongCards = [];
  wrongIdx = 0;
  document.getElementById("btnWrong").style.display = "none";
  const paperDiv = document.getElementById(`paper${globalIdx}`);
  if (paperDiv) {
    paperDiv.outerHTML = renderPaper(globalIdx);
  }
  // Hide score
  document.getElementById('scoreText').style.display = 'none';
  document.getElementById('scoreHint').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========================  SHUFFLE  ========================

function shufflePaper() {
  const globalIdx = getGlobalPaperIdx(currentSubject, currentPaper);
  const paper = papers[globalIdx];
  const order = [];
  paper.sections.forEach((sec, si) => {
    // Create array of indices for this section
    const indices = sec.questions.map((_, qi) => ({ si, qi }));
    // Fisher-Yates shuffle
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    order.push(...indices);
  });
  shuffleMap[globalIdx] = order;
  const paperDiv = document.getElementById(`paper${globalIdx}`);
  if (paperDiv) {
    paperDiv.outerHTML = renderPaper(currentPaper);
  }
  // Hide score
  document.getElementById('scoreText').style.display = 'none';
  document.getElementById('scoreHint').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========================  TAB SWITCH  ========================

function switchSubject(subj) {
  currentSubject = subj;
  currentPaper = 0;
  wrongCards = [];
  wrongIdx = 0;
  document.getElementById("btnWrong").style.display = "none";
  document.getElementById("scoreText").style.display = "none";
  document.getElementById("scoreHint").style.display = "block";
  renderSubjectBar();
  renderTabBar();
  renderContainer();
  // Activate first paper of this subject
  switchPaper(0);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function switchPaper(idx) {
  currentPaper = idx;
  document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", i === idx));
  const globalIdx = getGlobalPaperIdx(currentSubject, idx);
  document.querySelectorAll(".paper").forEach((p, i) => p.classList.toggle("active", i === globalIdx));
  document.getElementById("scoreText").style.display = "none";
  document.getElementById("scoreHint").style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ========================  INIT  ========================

renderAll();

</script>
