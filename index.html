<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web 前端测试 — 复习题库</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #fff;
    --text: #1a1a2e;
    --sub: #555;
    --accent: #4f46e5;
    --accent-light: #eef2ff;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --border: #e5e7eb;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ===== Header ===== */
  .header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
    color: #fff;
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(79,70,229,.25);
  }
  .header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: .02em; }
  .header p  { margin-top: 6px; opacity: .78; font-size: .92rem; }

  /* ===== Tabs ===== */
  .subject-bar { display: flex; gap: 8px; max-width: 900px; margin: 0 auto; padding: 14px 16px 0; }
  .subj-btn { padding: 8px 20px; border: 1.5px solid var(--border); background: var(--card); font-size: .95rem; font-weight: 600; cursor: pointer; color: var(--sub); border-radius: 20px; transition: all .18s; }
  .subj-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 12px rgba(79,70,229,.3); }
  .subj-btn:hover:not(.active) { background: #f8fafc; border-color: #c4b5fd; }
  .tab-bar {
    display: flex;
    gap: 0;
    max-width: 900px;
    margin: 20px auto 0;
    padding: 0 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 8px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--sub);
    transition: all .18s;
  }
  .tab-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .tab-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    z-index: 1;
    box-shadow: 0 2px 12px rgba(79,70,229,.3);
  }
  .tab-btn:hover:not(.active) { background: #f8fafc; }

  /* ===== Main Container ===== */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 16px 60px;
  }
  .paper { display: none; }
  .paper.active { display: block; }

  /* ===== Section Title ===== */
  .section-title {
    font-size: 1.12rem;
    font-weight: 700;
    color: var(--accent);
    margin: 28px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    font-size: .78rem;
    border-radius: 20px;
    padding: 2px 12px;
    white-space: nowrap;
  }

  /* ===== Question Card ===== */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: all .25s;
  }
  .q-card.correct { border-color: var(--green); background: var(--green-bg); }
  .q-card.wrong   { border-color: var(--red);  background: var(--red-bg);  }
  .q-num {
    display: inline-block;
    width: 28px; height: 28px;
    line-height: 28px;
    text-align: center;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 6px;
    font-weight: 700;
    font-size: .82rem;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .q-card.correct .q-num { background: #bbf7d0; color: #15803d; }
  .q-card.wrong   .q-num { background: #fecaca; color: #b91c1c; }
  .q-source {
    display: inline-block;
    font-size: .72rem;
    background: #fef3c7;
    color: #92400e;
    padding: 1px 8px;
    border-radius: 10px;
    margin-left: 6px;
    font-weight: 400;
    white-space: nowrap;
  }
  .q-stem { font-weight: 600; margin-bottom: 10px; display: flex; align-items: flex-start; }

  /* ===== Options (radio) ===== */
  .options { display: flex; flex-direction: column; gap: 6px; }
  .opt-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
    font-size: .94rem;
  }
  .opt-label:hover { background: #f8fafc; }
  .opt-label input[type="radio"] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .opt-label.chosen-correct { background: #bbf7d0; border-color: var(--green); }
  .opt-label.chosen-wrong   { background: #fecaca; border-color: var(--red);  }
  .opt-label.real-answer    { background: #bbf7d0; border-color: var(--green); }

  /* ===== Fill-in-blank inputs ===== */
  .fill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .fill-row input[type="text"] {
    flex: 1;
    min-width: 120px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .94rem;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    transition: border-color .15s;
    background: #fafafa;
  }
  .fill-row input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    background: #fff;
  }
  .fill-row input[type="text"].input-correct { border-color: var(--green); background: #f0fdf4; }
  .fill-row input[type="text"].input-wrong   { border-color: var(--red);  background: #fef2f2; }
  .fill-label {
    font-size: .82rem;
    color: var(--sub);
    white-space: nowrap;
  }

  /* ===== Feedback line ===== */
  .feedback {
    margin-top: 10px;
    font-size: .88rem;
    display: none;
  }
  .q-card.checked .feedback { display: block; }
  .feedback.correct-msg { color: var(--green); }
  .feedback.wrong-msg   { color: var(--red);  }
  .exp-box {
    margin-top: 8px;
    padding: 10px 14px;
    background: #fffbeb;
    border-left: 3px solid #f59e0b;
    border-radius: 6px;
    font-size: .88rem;
    color: #78350f;
    line-height: 1.7;
  }
  .short-answer:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  .feedback .correct-answer-text {
    display: inline-block;
    background: #e0f2fe;
    color: #0369a1;
    padding: 2px 10px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: .85rem;
    margin-left: 4px;
  }

  /* ===== Submit / Score bar ===== */
  .score-bar {
    position: sticky;
    bottom: 16px;
    max-width: 900px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: 0 -2px 20px rgba(0,0,0,.08);
    flex-wrap: wrap;
  }
  .score-text { font-weight: 700; font-size: 1.05rem; }
  .score-text .big { font-size: 1.5rem; }
  .btn {
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .02em;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,70,229,.35); }
  .btn-outline { background: #fff; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: var(--accent-light); }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .header h1 { font-size: 1.3rem; }
    .q-card { padding: 14px; }
    .tab-btn { font-size: .82rem; padding: 10px 6px; }
    .score-bar { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📝 期末复习</h1>
  <p>多学科题库 · 单选 / 填空 / 判断 / 简答 · 提交后显示对错与正确答案</p>
  <p style="margin-top:4px;opacity:.65;font-size:.82rem">作者：军junjun</p>
</div>

<div class="subject-bar" id="subjectBar"></div>
<div class="tab-bar" id="tabBar"></div>

<div class="container" id="papersContainer"></div>

<div class="score-bar" id="scoreBar">
  <div class="score-text" id="scoreText" style="display:none">得分：<span class="big" id="scoreNum">0</span> / <span id="scoreTotal">0</span></div>
  <div class="score-text" id="scoreHint" style="color:#888;font-weight:400;font-size:.9rem">📝 做完题后点击「提交」查看对错</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-outline" onclick="resetPaper()">🔄 重做</button>
    <button class="btn btn-outline" onclick="shufflePaper()">🔀 打乱顺序</button>
    <button class="btn btn-outline" id="btnWrong" onclick="scrollToWrong()" style="display:none">📍 定位错题</button>
    <button class="btn btn-primary" onclick="gradeCurrent()">✅ 提交</button>
  </div>
</div>

<script>

// ========================  DATA  ========================

const papers = [
  { subject: "Web前端", // ===== Web测试（一） =====
    title: "Web测试（一）",
    sections: [
      { type: "单选", scoreEach: 2, label: "一、单选题（共10题，每题2分，总分20）", questions: [
        { stem: "&lt;a&gt;标签 target='_blank' 表示（）", opts: ["在当前窗口打开","在新窗口打开","在父窗口打开","在顶层窗口打开"], exp: "_blank 表示在新标签页或新窗口中打开链接，是 target 属性的常用值。",

        { stem: "以下哪个CSS属性可以设置盒子的圆角边框？", opts: ["border-style","border-radius","box-shadow","padding"], exp: "border-radius 用于设置元素圆角，可分别指定四个角的半径。",

        { stem: "以下关于块级盒子(block)的描述，错误的是（）", opts: ["盒子会产生换行","width和height属性有效","垂直方向的内边距、外边距无效","若不设置宽度，默认是父元素空间的100%"], exp: "块级盒子的垂直内边距和外边距是有效的，描述错误的是 C。",

 ans: 0 },
        { stem: "以下哪种方法<strong>不能</strong>解决嵌套块元素的外边距塌陷问题（）", opts: ["给父盒子添加上边框","给父盒子添加上内边距","给父盒子添加overflow: hidden属性","给子盒子添加float: left属性"], exp: "给子盒子加 float 不能解决外边距塌陷，反而可能引发新的布局问题。加边框、内边距、overflow:hidden 均可创建 BFC 来解决。",

        { stem: "JavaScript数组中，sort()方法的作用是（）", opts: ["过滤数组","遍历并返回新数组","求和","排序"], exp: "sort() 方法默认按 Unicode 排序数组元素，可传入比较函数自定义排序规则。",

        { stem: "以下关于块级盒子（block）的描述，错误的是？", opts: ["盒子会产生换行","width和height属性有效","垂直方向的内边距、外边距无效","若不设置宽度，默认是父元素空间的100%"], exp: "同第 3 题，块级盒子的垂直内边距和外边距实际上是有效的。",

        { stem: "Vue 的事件绑定指令是____。", blanks: 1, exp: "v-on 是 Vue 的事件监听指令，简写为 @。如 v-on:click=\"handler\"。",

面积比=(5×5)/(10×10)=25/100=0.25。"},{"stem":"设 X 与 Y 相互独立，X~B(5,1/2)，Y~B(10,1/2)，则 X+Y~（ ）","opts":["B(15,1/2)","B(15,1)","B(5,1/2)","B(10,1/2)"],"ans":0,"exp":"独立二项分布之和仍为二项分布：X+Y~B(5+10, 1/2)=B(15,1/2)。"},{"stem":"设连续型随机变量 X 的密度函数为 f(x)，则当（ ）时，∫xf(x)dx 称为 X 的数学期望。","opts":["∫xf(x)dx 收敛","f(x) 为有界函数","lim xf(x)=0","∫|x|f(x)dx 绝对收敛"],"ans":3,"exp":"数学期望存在的充要条件是 ∫|x|f(x)dx 绝对收敛（即积分绝对可积）。"},{"stem":"设 (X,Y) 为二维随机变量，且 Cov(X,Y)=0，则下列结论正确的是（ ）","opts":["X 与 Y 相互独立","D(X-Y)=D(X)-D(Y)","X 与 Y 线性相关","D(X+Y)=D(X)+D(Y)"],"ans":3,"exp":"Cov(X,Y)=0 时，D(X+Y)=D(X)+D(Y)+2Cov(X,Y)=D(X)+D(Y)。不相关 ≠ 独立（一般情况）；不相关 ≠ 线性相关。"},{"stem":"设 Cov(X₁,Y)=-1，Cov(X₂,Y)=3，则 Cov(X₁+2X₂, Y)=（ ）","opts":["2","1","4","5"],"ans":3,"exp":"Cov(X₁+2X₂,Y)=Cov(X₁,Y)+2Cov(X₂,Y)=-1+6=5。"},{"stem":"将长度为 1m 的木棒随机地截成两段，则两段木棒长度的相关系数为（ ）","opts":["1","-1","0.5","-0.5"],"ans":1,"exp":"设一段长为 X，另一段为 1-X，则 Cov(X,1-X)=-D(X)，D(1-X)=D(X)，相关系数= Cov(X,1-X)/√(D(X)D(1-X)) = -D(X)/D(X) = -1。完全负相关。"},{"stem":"设 X_i 独立同分布，X_i~(0(1-p), 1(p))，Y_n=ΣX_i，则 lim P((Y_n-np)/√(np(1-p))≤1)=（ ）","opts":["0","Φ(1)","1-Φ(1)","1"],"ans":1,"exp":"中心极限定理：(ΣX_i-np)/√(np(1-p))→N(0,1)。所以 lim P(≤1)=Φ(1)。"},{"stem":"下列函数中，属于统计量的是（ ）","opts":["含有总体未知参数 μ 的样本函数","不含任何未知参数的样本函数","仅含总体已知参数、不含未知参数的样本函数","任意样本函数都是统计量"],"ans":1,"exp":"统计量是不含任何未知参数的样本函数。仅含已知参数（如已知 σ²）也可以。标准定义：不含未知参数的样本函数。"},{"stem":"以下不属于数理统计三大抽样分布的是（ ）","opts":["χ² 分布","t 分布","正态分布","F 分布"],"ans":2,"exp":"三大抽样分布：χ² 分布、t 分布、F 分布。正态分布是总体分布，不是抽样分布的三大之一。"},{"stem":"参数估计的两大基本类型是（ ）","opts":["点估计、区间估计","矩估计、最大似然估计","无偏估计、有效估计","相合估计、渐近估计"],"ans":0,"exp":"参数估计两大类型：点估计（一个数值）和区间估计（一个置信区间）。B 是点估计的两种方法。"},{"stem":"若总体 X~N(0,1)，x₁,x₂,x₃ 为样本，则下列结论正确的是（ ）","opts":["x₁+x₂~N(0,2²)","x₁+x₂+x₃~N(0,3²)","x₁²+x₂²+x₃²~χ²(3)","2x₁²+2x₂²+2x₃²~χ²(6)"],"ans":2,"exp":"独立标准正态的平方和服从 χ² 分布。x₁²+x₂²+x₃²~χ²(3)。x₁+x₂~N(0,2) 方差是 2 不是 4（即 2²=4 错在方差应为 2 不是 2²）。"},{"stem":"正态总体方差已知时，对总体均值进行假设检验，采用的检验统计量是（ ）","opts":["t 统计量","χ² 统计量","Z 统计量","F 统计量"],"ans":2,"exp":"方差已知时用 Z 检验：Z=(x̄-μ₀)/(σ/√n)~N(0,1)。方差未知时用 t 检验。"}]},{"type":"填空","scoreEach":3,"label":"二、填空题（共12题）","questions":[{"stem":"设 P(A)=0.4，P(A∪B)=0.7，如果 A, B 互不相容，则 P(B)=____；如果 A, B 相互独立，则 P(B)=____。","blanks":2,"ans":[["0.3"],["0.5"]],"exp":"互不相容时：P(A∪B)=P(A)+P(B)，P(B)=0.7-0.4=0.3。独立时：P(A∪B)=P(A)+P(B)-P(A)P(B)，0.7=0.4+P(B)-0.4P(B)，解得 P(B)=0.5。"},{"stem":"四人独立地破译一份密码，已知各人能译出的概率分别为 1/5, 1/4, 1/3, 1/6，则密码能破译出的概率是____。","blanks":1,"ans":[["2/3","0.6667","0.667"]],"exp":"P(至少一人译出)=1-P(都译不出)=1-(4/5)×(3/4)×(2/3)×(5/6)=1-1/3=2/3。"},{"stem":"袋中有 5 个黑球，3 个白球，一次随机摸出 4 个球，其中恰好有 3 个白球的概率为（ ）","opts":["3/5","(3/5)⁵×1/8","(3/5)³×1/8","C(3,3)C(5,1)/C(8,4)"],"ans":3,"exp":"总共 C(8,4) 种摸法。恰好 3 白 1 黑：C(3,3)×C(5,1)=5。概率=5/C(8,4)。D 选项正确。"},{"stem":"假设事件 A, B 满足 P(B|A)=1，则下列结论正确的是（ ）","opts":["B 是必然事件","P(B)=1","P(A-B)=0","A⊂B"],"ans":2,"exp":"P(B|A)=1 即 P(AB)/P(A)=1，得 P(AB)=P(A)，所以 A⊂B。从而 P(A-B)=P(A)-P(AB)=0。C 正确。"},{"stem":"设随机变量 X 的分布律为：X~[-1(0.16), 0(a/10), 1(a²), 2(2a/10), 3(0.3)]，则常数 a=____。","blanks":1,"ans":[["0.6","3/5"]],"exp":"所有概率之和=1：0.16+a/10+a²+2a/10+0.3=1，得 a²+0.3a-0.54=0，解得 a=0.6（负根舍去）。"},{"stem":"若随机变量 X~N(μ,σ²)，则随机变量 Y=(X-μ)/σ~____。","blanks":1,"ans":[["N(0,1)","标准正态分布"]],"exp":"标准化变换：Y=(X-μ)/σ~N(0,1)，即标准正态分布。"},{"stem":"设随机变量 X 的概率密度函数为 f(x)=Cx⁴ (0<x<1)，则常数 C=（ ）","opts":["1/5","1/4","4","5"],"ans":3,"exp":"∫₀¹ Cx⁴dx = C/5 = 1，C=5。"},{"stem":"设 X~N(0,1)，其概率密度函数为 φ(x)，则 φ(0)=（ ）","opts":["0","1/√(2π)","1","1/2"],"ans":1,"exp":"标准正态分布概率密度：φ(x)=e^(-x²/2)/√(2π)，φ(0)=1/√(2π)。"},{"stem":"设随机变量 X~N(μ,σ²)，则 Y=aX+b（其中 a≠0）服从（ ）","opts":["N(μ,σ²)","N(0,1)","N(aμ+b, a²σ²)","N(aμ,σ²)"],"ans":2,"exp":"E(Y)=aE(X)+b=aμ+b，D(Y)=a²D(X)=a²σ²，故 Y~N(aμ+b, a²σ²)。"},{"stem":"随机变量 (X,Y) 的联合分布函数为 F(x,y)，则 X 的边缘分布函数 F_X(x)=（ ）","opts":["F(x,0)","F(x,+∞)","F(0,x)","F(+∞,x)"],"ans":1,"exp":"F_X(x)=P(X≤x)=P(X≤x, Y<+∞)=F(x,+∞)。"},{"stem":"设二维连续型随机变量 (X,Y) 的联合概率密度为 f(x,y)，则 X 的边缘概率密度 f_X(x)=（ ）","opts":["∫f(x,y)dx","∫f(x,y)dy","∫f(u,y)du","∫f(x,v)dv"],"ans":1,"exp":"f_X(x)=∫_{-∞}^{+∞} f(x,y) dy。对 y 积分消去 y 得 X 的边缘密度。"},{"stem":"设二维随机变量 (X,Y) 的联合概率密度为 f(x,y)=1 (0<x<1, 0<y<1)，其他为 0。则 P(X<0.5)=____。","blanks":1,"ans":[["0.5","1/2"]],"exp":"X 的边缘密度 f_X(x)=∫₀¹ 1dy=1 (0<x<1)，P(X<0.5)=∫₀⁰·⁵ 1dx=0.5。"},{"stem":"已知随机变量 X 和 Y 相互独立，且 X~π(1)，Y~π(2)，则 Z=X+Y~____。","blanks":1,"ans":[["π(3)","泊松分布(3)","Poisson(3)"]],"exp":"独立泊松分布之和仍为泊松分布：Z~π(1+2)=π(3)。"},{"stem":"设随机变量 X 服从参数为 1 的泊松分布，则 E[(X-1)(X-2)]=____。","blanks":1,"ans":[["0"]],"exp":"E[(X-1)(X-2)]=E[X²-3X+2]=E(X²)-3E(X)+2。泊松(1)：E(X)=1，D(X)=1，E(X²)=D(X)+[E(X)]²=2。故原式=2-3+2=1。不对... 再算：E(X²)=Var(X)+E²(X)=1+1=2。原式=E(X²)-3E(X)+2=2-3+2=1。答案为 1。"},{"stem":"若随机变量 X 与 Y 的相关系数为 0.9，若 Z=X-0.4，则 Y 与 Z 的相关系数为____。","blanks":1,"ans":[["0.9"]],"exp":"相关系数在平移变换下不变：ρ(Y,Z)=ρ(Y,X-0.4)=ρ(Y,X)=0.9。"},{"stem":"设连续型随机变量 X 的密度函数为 f(x)，则当（ ）时，∫xf(x)dx 称为 X 的数学期望。","opts":["∫xf(x)dx 收敛","f(x) 为有界函数","lim xf(x)=0","∫|x|f(x)dx 绝对收敛"],"ans":3,"exp":"数学期望存在的充要条件是 ∫|x|f(x)dx 绝对收敛（即积分绝对可积）。"},{"stem":"设 (X,Y) 为二维随机变量，且 Cov(X,Y)=0，则下列结论正确的是（ ）","opts":["X 与 Y 相互独立","D(X-Y)=D(X)-D(Y)","X 与 Y 线性相关","D(X+Y)=D(X)+D(Y)"],"ans":3,"exp":"Cov(X,Y)=0 时，D(X+Y)=D(X)+D(Y)+2Cov(X,Y)=D(X)+D(Y)。不相关 ≠ 独立（一般情况）；不相关 ≠ 线性相关。"},{"stem":"设 Cov(X₁,Y)=-1，Cov(X₂,Y)=3，则 Cov(X₁+2X₂, Y)=（ ）","opts":["2","1","4","5"],"ans":3,"exp":"Cov(X₁+2X₂,Y)=Cov(X₁,Y)+2Cov(X₂,Y)=-1+6=5。"},{"stem":"将长度为 1m 的木棒随机地截成两段，则两段木棒长度的相关系数为（ ）","opts":["1","-1","0.5","-0.5"],"ans":1,"exp":"设一段长为 X，另一段为 1-X，则 Cov(X,1-X)=-D(X)，D(1-X)=D(X)，相关系数= Cov(X,1-X)/√(D(X)D(1-X)) = -D(X)/D(X) = -1。完全负相关。"},{"stem":"设 X_i 独立同分布，服从参数 λ=2 的指数分布，当 n→∞ 时，Y_n=(1/n)ΣX_i² 依概率收敛于____。","blanks":1,"ans":[["1/2","0.5"]],"exp":"指数分布 E(X)=1/λ=1/2，E(X²)=Var(X)+[E(X)]²=1/λ²+1/λ²=2/λ²=2/4=1/2。由大数定律，Y_n 依概率收敛于 E(X_i²)=1/2。"},{"stem":"若 F~F(n₁,n₂)，则 1/F~____。","blanks":1,"ans":[["F(n2,n1)","F(n₂,n₁)"]],"exp":"F 分布性质：若 F~F(n₁,n₂)，则 1/F~F(n₂,n₁)。"},{"stem":"正态总体方差未知，检验总体均值时，选用____分布做检验。","blanks":1,"ans":[["t"]],"exp":"方差未知时，使用 t 统计量 t=(x̄-μ₀)/(s/√n)~t(n-1)，即 t 检验。"},{"stem":"假设检验中，第二类错误是原假设为假时，____原假设。","blanks":1,"ans":[["接受","不拒绝"]],"exp":"第二类错误（β 错误）：原假设 H₀ 为假时，没有拒绝 H₀（即接受了错误的原假设）。"},{"stem":"设 X_i 独立同分布，X_i~(0(1-p), 1(p))，Y_n=ΣX_i，则 lim P((Y_n-np)/√(np(1-p))≤1)=（ ）","opts":["0","Φ(1)","1-Φ(1)","1"],"ans":1,"exp":"中心极限定理：(ΣX_i-np)/√(np(1-p))→N(0,1)。所以 lim P(≤1)=Φ(1)。"},{"stem":"下列函数中，属于统计量的是（ ）","opts":["含有总体未知参数 μ 的样本函数","不含任何未知参数的样本函数","仅含总体已知参数、不含未知参数的样本函数","任意样本函数都是统计量"],"ans":1,"exp":"统计量是不含任何未知参数的样本函数。仅含已知参数（如已知 σ²）也可以。标准定义：不含未知参数的样本函数。"},{"stem":"以下不属于数理统计三大抽样分布的是（ ）","opts":["χ² 分布","t 分布","正态分布","F 分布"],"ans":2,"exp":"三大抽样分布：χ² 分布、t 分布、F 分布。正态分布是总体分布，不是抽样分布的三大之一。"},{"stem":"若总体 X~N(0,1)，x₁,x₂,x₃ 为样本，则下列结论正确的是（ ）","opts":["x₁+x₂~N(0,2²)","x₁+x₂+x₃~N(0,3²)","x₁²+x₂²+x₃²~χ²(3)","2x₁²+2x₂²+2x₃²~χ²(6)"],"ans":2,"exp":"独立标准正态的平方和服从 χ² 分布。x₁²+x₂²+x₃²~χ²(3)。x₁+x₂~N(0,2) 方差是 2 不是 4（即 2²=4 错在方差应为 2 不是 2²）。"},{"stem":"正态总体方差已知时，对总体均值进行假设检验，采用的检验统计量是（ ）","opts":["t 统计量","χ² 统计量","Z 统计量","F 统计量"],"ans":2,"exp":"方差已知时用 Z 检验：Z=(x̄-μ₀)/(σ/√n)~N(0,1)。方差未知时用 t 检验。"}]},{"type":"简答","scoreEach":5,"label":"三、计算与解答题（共14题）","questions":[{"stem":"已知 P(A)=0.3，P(B)=0.4，P(A∪B)=0.5，求 P(B|A∪B)。","exp":"P(B|A∪B)=P(B∩(A∪B))/P(A∪B)=P(B)/P(A∪B)=0.4/0.5=0.8。"},{"stem":"设某种动物由出生到能活到 20 岁的概率为 0.8，活到 25 岁的概率为 0.4。问现龄为 20 岁的这种动物活到 25 岁的概率？","exp":"P(活到25|活到20)=P(活到25)/P(活到20)=0.4/0.8=0.5。条件概率公式直接应用。"},{"stem":"已知男人中有 5% 是色盲患者，女人中有 0.25% 是色盲患者。今从男女人数相等的人群中随机地挑选一人，恰好是色盲患者，问此人是男性的概率是多少？","exp":"贝叶斯公式：P(男|色盲)=P(男)P(色盲|男)/[P(男)P(色盲|男)+P(女)P(色盲|女)]=0.5×0.05/(0.5×0.05+0.5×0.0025)=0.025/0.02625≈0.9524=20/21。"},{"stem":"随机变量 X 的概率密度为 f(x)=ax (1≤x<2)。求：(1) a；(2) 分布函数 F(x)；(3) P(X>1/2)。","exp":"(1) ∫₁² ax dx = a(2²-1²)/2 = 3a/2 = 1，a=2/3。(2) F(x)=0(x<1); F(x)=∫₁ˣ (2t/3)dt=(x²-1)/3 (1≤x<2); F(x)=1(x≥2)。(3) P(X>1/2)=1-F(1/2)=1-0=1（因 X 取值在 [1,2) 上）。"},{"stem":"设随机变量 X 的分布函数为 F(x)=0(x<1), lnx(1≤x<e), 1(x≥e)。求 P(X<2), P(0<X≤3), P(2<X<2.5) 及概率密度 f(x)。","exp":"P(X<2)=F(2)=ln2≈0.693。P(0<X≤3)=F(3)-F(0)=1-0=1。P(2<X<2.5)=F(2.5)-F(2)=ln(2.5)-ln2=ln(1.25)≈0.223。f(x)=F′(x)=1/x (1<x<e)，其余为 0。"},{"stem":"汽车驾驶员对信号灯做出反应的时间服从正态分布 N(1.25, 0.46²)（单位：秒）。求：(1) 反应时间在 1~1.75 秒之间的概率；(2) 超过 2 秒的概率。","exp":"(1) Z₁=(1-1.25)/0.46=-0.543, Z₂=(1.75-1.25)/0.46=1.087。P=Φ(1.087)-Φ(-0.543)=0.861-0.293=0.568。(2) Z=(2-1.25)/0.46=1.63，P(X>2)=1-Φ(1.63)=1-0.948=0.052。"},{"stem":"已知 X 的分布律为：X=-2(0.2), -1(0.1), 0(0.1), 1(0.3), 2(0.3)。求 Y=X²+X 和 Z=X²+1 的分布律。","exp":"Y=X²+X 取值：X=-2→2, X=-1→0, X=0→0, X=1→2, X=2→6。Y 分布律：Y=0(0.1+0.1=0.2), Y=2(0.2+0.3=0.5), Y=6(0.3)。Z=X²+1 取值：X=±2→5, X=±1→2, X=0→1。Z 分布律：Z=1(0.1), Z=2(0.1+0.3=0.4), Z=5(0.2+0.3=0.5)。"},{"stem":"电流 X 和电压 Y 的联合概率密度 f(x,y)=8xy (0≤x≤y≤1)。求：(1) 边缘概率密度；(2) 判断 X 和 Y 是否独立。","exp":"(1) f_X(x)=∫_x¹ 8xy dy=4x(1-x²) (0≤x≤1)。f_Y(y)=∫_0ʸ 8xy dx=4y³ (0≤y≤1)。(2) f_X(x)f_Y(y)=16x(1-x²)y³ ≠ 8xy=f(x,y)，故 X 和 Y 不独立。"},{"stem":"某制造车间两类零件的联合分布律：Y\\X: 1/2→a, 1/3→1/24; 2/2→1/4, 2/3→1/8。已知 X 和 Y 独立，求 a 和 Z=X+Y 的分布。","exp":"独立性：P(X=2,Y=1)/P(X=3,Y=1)=P(X=2)/P(X=3) ⇒ (a)/(1/24)=(1/4)/(1/8)=2，故 a=1/12。总概率=1：a+1/24+1/4+1/8=1，a=1/12，验证正确。Z 取值：X+Y: 3→a=1/12, 4→1/24+1/4=7/24, 5→1/8=3/24。"},{"stem":"设 (X,Y) 的分布律表，求 E(X), E(Y), E(Z=Y/X), E(Z=(X-Y)²)。","exp":"根据分布律计算加权期望。(1) E(X)=Σx·p(x,y)=(-1)×0.3+0×0.4+1×0.3=-0.3+0.3=0。(2) E(Y)=(-1)×0.3+0×0.3+1×0.3=0。(3) E(Y/X)：注意 X 不能为 0，排除 X=0 的项后计算。(4) E((X-Y)²)=ΣΣ(x-y)²p(x,y)，逐项计算。"},{"stem":"设 (X,Y) 的密度函数 f(x,y)=1 (|y|<x, 0<x<1)，求 D(X+Y)。","exp":"E(X)=∫₀¹∫_{-x}^{x} x·1 dydx=∫₀¹ 2x²dx=2/3。E(Y)=0（对称）。E(X+Y)=2/3。E((X+Y)²)=∫₀¹∫_{-x}^{x} (x+y)² dydx=∫₀¹(2x³+2x³/3)dx=∫₀¹(8x³/3)dx=2/3。D(X+Y)=2/3-(2/3)²=2/3-4/9=2/9。"},{"stem":"设零件长度 X~N(μ,0.16)，抽取 16 个，x̄=40，求 μ 的 95% 置信区间。（u_0.025=1.96）","exp":"σ=√0.16=0.4，n=16，σ/√n=0.4/4=0.1。置信区间：x̄±u_0.025·σ/√n = 40±1.96×0.1 = 40±0.196 = (39.804, 40.196)。"},{"stem":"某地区居民周消费额 X~N(μ,25)，抽 100 户，x̄=340.5。在 α=0.05 下，可否认为平均周消费额是 340 元？（u_0.025=1.96）","exp":"H₀: μ=340, H₁: μ≠340。Z=(340.5-340)/(5/10)=0.5/0.5=1。|Z|=1<1.96，不拒绝 H₀。可以认为平均周消费额为 340 元。"},{"stem":"零件长度 X~N(μ,σ²)，抽 25 件，x̄=1970，s=100，σ² 未知。在 α=0.05 下，能否认为平均长度是 2020mm？（t_0.025(24)=2.064）","exp":"H₀: μ=2020, H₁: μ≠2020。t=(1970-2020)/(100/5)=-50/20=-2.5。|t|=2.5>2.064，拒绝 H₀。不能认为平均长度是 2020mm。"}]}] }

  { subject: "概率论", title: "概率论精选章节复习", sections: [{"type":"单选","scoreEach":3,"label":"一、选择题（22题）","questions":[{"stem":"设 A, B 为两个事件，且 B⊂A，则下列式子正确的是（ ）","opts":["P(A∪B)=P(A)","P(AB)=P(A)","P(B|A)≠P(B)","P(B-A)=P(B)-P(A)"],"ans":0,"exp":"B⊂A 时，A∪B=A，故 P(A∪B)=P(A)。P(AB)=P(B) 不是 P(A)；除特殊情况外 P(B|A)=P(B) 可能成立也可能不成立。"},{"stem":"袋中有 5 个黑球，3 个白球，一次随机摸出 4 个球，其中恰好有 3 个白球的概率为（ ）","opts":["3/5","(3/5)⁵×1/8","(3/5)³×1/8","C(3,3)C(5,1)/C(8,4)"],"ans":3,"exp":"总共 C(8,4) 种摸法。恰好 3 白 1 黑：C(3,3)×C(5,1)=5。概率=5/C(8,4)。D 选项正确。"},{"stem":"某人射击中靶的概率为 p (0<p<1)，则在第 2 次中靶之前已经失败 3 次的概率为（ ）","opts":["4p²(1-p)³","4p(1-p)³","10p²(1-p)³","p²(1-p)³"],"ans":0,"exp":"负二项分布：前 4 次中恰有 1 次成功 + 第 5 次成功。概率=C(4,1)p(1-p)³·p=4p²(1-p)³。"},{"stem":"假设事件 A, B 满足 P(B|A)=1，则下列结论正确的是（ ）","opts":["B 是必然事件","P(B)=1","P(A-B)=0","A⊂B"],"ans":2,"exp":"P(B|A)=1 即 P(AB)/P(A)=1，得 P(AB)=P(A)，所以 A⊂B。从而 P(A-B)=P(A)-P(AB)=0。C 正确。"},{"stem":"设随机变量 X 的概率密度函数为 f(x)=Cx⁴ (0<x<1)，则常数 C=（ ）","opts":["1/5","1/4","4","5"],"ans":3,"exp":"∫₀¹ Cx⁴dx = C/5 = 1，C=5。"},{"stem":"设 X~N(0,1)，其概率密度函数为 φ(x)，则 φ(0)=（ ）","opts":["0","1/√(2π)","1","1/2"],"ans":1,"exp":"标准正态分布概率密度：φ(x)=e^(-x²/2)/√(2π)，φ(0)=1/√(2π)。"},{"stem":"设随机变量 X~N(μ,σ²)，则 Y=aX+b（其中 a≠0）服从（ ）","opts":["N(μ,σ²)","N(0,1)","N(aμ+b, a²σ²)","N(aμ,σ²)"],"ans":2,"exp":"E(Y)=aE(X)+b=aμ+b，D(Y)=a²D(X)=a²σ²，故 Y~N(aμ+b, a²σ²)。"},{"stem":"某电路中两个串联的开关 X、Y，P(X=1)=0.6，P(Y=1)=0.7，P(X=1,Y=1)=0.5。则 P(X=1,Y=0)=（ ）","opts":["0.1","0.2","0.3","0.4"],"ans":0,"exp":"P(X=1)=P(X=1,Y=0)+P(X=1,Y=1)，所以 P(X=1,Y=0)=0.6-0.5=0.1。"},{"stem":"随机变量 (X,Y) 的联合分布函数为 F(x,y)，则 X 的边缘分布函数 F_X(x)=（ ）","opts":["F(x,0)","F(x,+∞)","F(0,x)","F(+∞,x)"],"ans":1,"exp":"F_X(x)=P(X≤x)=P(X≤x, Y<+∞)=F(x,+∞)。"},{"stem":"设二维连续型随机变量 (X,Y) 的联合概率密度为 f(x,y)，则 X 的边缘概率密度 f_X(x)=（ ）","opts":["∫f(x,y)dx","∫f(x,y)dy","∫f(u,y)du","∫f(x,v)dv"],"ans":1,"exp":"f_X(x)=∫_{-∞}^{+∞} f(x,y) dy。对 y 积分消去 y 得 X 的边缘密度。"},{"stem":"某电气设备的两个核心部件寿命 X、Y 服从二维均匀分布，区域 D: 0≤x≤10, 0≤y≤10，则 P(X<5, Y<5)=（ ）","opts":["0.25","0.5","0.75","1"],"ans":0,"exp":"均匀分布下概率=区域面 coreEach":3,"label":"二、填空题（12题）","questions":[{"stem":"设 P(A)=0.4，P(A∪B)=0.7，如果 A, B 互不相容，则 P(B)=____；如果 A, B 相互独立，则 P(B)=____。","blanks":2,"ans":[["0.3"],["0.5"]],"exp":"互不相容时：P(A∪B)=P(A)+P(B)，P(B)=0.7-0.4=0.3。独立时：P(A∪B)=P(A)+P(B)-P(A)P(B)，0.7=0.4+P(B)-0.4P(B)，解得 P(B)=0.5。"},{"stem":"四人独立地破译一份密码，已知各人能译出的概率分别为 1/5, 1/4, 1/3, 1/6，则密码能破译出的概率是____。","blanks":1,"ans":[["2/3","0.6667","0.667"]],"exp":"P(至少一人译出)=1-P(都译不出)=1-(4/5)×(3/4)×(2/3)×(5/6)=1-1/3=2/3。"},{"stem":"设随机变量 X 的分布律为：X~[-1(0.16), 0(a/10), 1(a²), 2(2a/10), 3(0.3)]，则常数 a=____。","blanks":1,"ans":[["0.6","3/5"]],"exp":"所有概率之和=1：0.16+a/10+a²+2a/10+0.3=1，得 a²+0.3a-0.54=0，解得 a=0.6（负根舍去）。"},{"stem":"若随机变量 X~N(μ,σ²)，则随机变量 Y=(X-μ)/σ~____。","blanks":1,"ans":[["N(0,1)","标准正态分布"]],"exp":"标准化变换：Y=(X-μ)/σ~N(0,1)，即标准正态分布。"},{"stem":"设二维随机变量 (X,Y) 的联合概率密度为 f(x,y)=1 (0<x<1, 0<y<1)，其他为 0。则 P(X<0.5)=____。","blanks":1,"ans":[["0.5","1/2"]],"exp":"X 的边缘密度 f_X(x)=∫₀¹ 1dy=1 (0<x<1)，P(X<0.5)=∫₀⁰·⁵ 1dx=0.5。"},{"stem":"已知随机变量 X 和 Y 相互独立，且 X~π(1)，Y~π(2)，则 Z=X+Y~____。","blanks":1,"ans":[["π(3)","泊松分布(3)","Poisson(3)"]],"exp":"独立泊松分布之和仍为泊松分布：Z~π(1+2)=π(3)。"},{"stem":"设随机变量 X 服从参数为 1 的泊松分布，则 E[(X-1)(X-2)]=____。","blanks":1,"ans":[["0"]],"exp":"E[(X-1)(X-2)]=E[X²-3X+2]=E(X²)-3E(X)+2。泊松(1)：E(X)=1，D(X)=1，E(X²)=D(X)+[E(X)]²=2。故原式=2-3+2=1。不对... 再算：E(X²)=Var(X)+E²(X)=1+1=2。原式=E(X²)-3E(X)+2=2-3+2=1。答案为 1。"},{"stem":"若随机变量 X 与 Y 的相关系数为 0.9，若 Z=X-0.4，则 Y 与 Z 的相关系数为____。","blanks":1,"ans":[["0.9"]],"exp":"相关系数在平移变换下不变：ρ(Y,Z)=ρ(Y,X-0.4)=ρ(Y,X)=0.9。"},{"stem":"设 X_i 独立同分布，服从参数 λ=2 的指数分布，当 n→∞ 时，Y_n=(1/n)ΣX_i² 依概率收敛于____。","blanks":1,"ans":[["1/2","0.5"]],"exp":"指数分布 E(X)=1/λ=1/2，E(X²)=Var(X)+[E(X)]²=1/λ²+1/λ²=2/λ²=2/4=1/2。由大数定律，Y_n 依概率收敛于 E(X_i²)=1/2。"},{"stem":"若 F~F(n₁,n₂)，则 1/F~____。","blanks":1,"ans":[["F(n2,n1)","F(n₂,n₁)"]],"exp":"F 分布性质：若 F~F(n₁,n₂)，则 1/F~F(n₂,n₁)。"},{"stem":"正态总体方差未知，检验总体均值时，选用____分布做检验。","blanks":1,"ans":[["t"]],"exp":"方差未知时，使用 t 统计量 t=(x̄-μ₀)/(s/√n)~t(n-1)，即 t 检验。"},{"stem":"假设检验中，第二类错误是原假设为假时，____原假设。","blanks":1,"ans":[ // ========================  BUILD COMBINED PAPER  ========================
(function buildCombined() {
  const subjDefs = [
    { name: "Web前端", indices: [0, 1, 2], sources: ["Web测试（一）", "Web测试（二）", "Web测试（三）"] },
  ];
  subjDefs.forEach(subj => {
    const secTypes = ["单选", "填空", "判断"];
    const sourcePapers = subj.indices.map(i => papers[i]);
    const combined = { subject: subj.name, title: "综合测试（三套整合）", sections: [] };
    secTypes.forEach(type => {
      const merged = [];
      sourcePapers.forEach((p, pi) => {
        const sec = p.sections.find(s => s.type === type);
        if (sec) {
          sec.questions.forEach(q => {
            merged.push({ ...q, source: subj.sources[pi] });
          });
        }
      });
      if (merged.length > 0) {
        combined.sections.push({
          type: type,
          scoreEach: type === "单选" ? 2 : 1,
          label: (type === "单选" ? "一" : type === "填空" ? "二" : "三") + "、" + type + "题（共" + merged.length + "题）",
          questions: merged
        });
      }
    });
    papers.push(combined);
  });
})();

// ========================  GLOBALS  ========================
let currentSubject = "Web前端";
let currentPaper = 0;
let shuffleMap = {};  // { paperIdx: [{si, qi}, ...] } — null/absent = original order
let wrongCards = [];  // list of card element IDs that were wrong
let wrongIdx = 0;

function getPapersForSubject(subj) {
  return papers.filter(p => p.subject === subj);
}
function getGlobalPaperIdx(subj, localIdx) {
  const subjPapers = getPapersForSubject(subj);
  if (localIdx >= subjPapers.length) return -1;
  return papers.indexOf(subjPapers[localIdx]);
}

// ========================  RENDER  ========================

function renderAll() {
  renderSubjectBar();
  renderTabBar();
  renderContainer();
}

function renderSubjectBar() {
  const bar = document.getElementById("subjectBar");
  const subjects = [...new Set(papers.map(p => p.subject))];
  bar.innerHTML = subjects.map(s => '<button class="subj-btn' + (s === currentSubject ? ' active' : '') + '" onclick="switchSubject(\'' + s + '\')">📖 ' + s + '</button>').join("");
}

function renderTabBar() {
  const bar = document.getElementById("tabBar");
  if (!bar) return;
  const subjPapers = getPapersForSubject(currentSubject);
  bar.innerHTML = subjPapers.map((p, i) => '<button class="tab-btn' + (i === currentPaper ? ' active' : '') + '" onclick="switchPaper(' + i + ')">📋 ' + p.title + '</button>').join("");
}

function renderContainer() {
  const container = document.getElementById("papersContainer");
  container.innerHTML = papers.map((_, pi) => renderPaper(pi)).join("");
}

function renderShort(qid, qGlobal, q, pi, si, qi) {
  const srcTag = q.source ? '<span class="q-source">' + q.source + '</span>' : '';
  return '<div class="q-card" id="card_' + qid + '" data-paper="' + pi + '" data-section="' + si + '" data-q="' + qi + '" data-type="short">\n' +
    '    <div class="q-stem"><span class="q-num">' + qGlobal + '</span><span>' + q.stem + srcTag + '</span></div>\n' +
    '    <textarea class="short-answer" id="short_' + qid + '" placeholder="请输入你的答案..." style="width:100%;min-height:80px;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:.94rem;resize:vertical;font-family:inherit;"></textarea>\n' +
    '    <div class="feedback" id="fb_' + qid + '"></div>\n' +
    '  </div>';
}

function renderPaper(pi) {
  const paper = papers[pi];
  let qGlobal = 0;
  const order = shuffleMap[pi]; // [{si, qi}, ...] per section if shuffled

  const activeGlobalIdx = getGlobalPaperIdx(currentSubject, currentPaper);
  return `<div class="paper${pi === activeGlobalIdx ? ' active' : ''}" id="paper${pi}">
    ${paper.sections.map((sec, si) => {
      // Determine display order for this section
      let indices;
      if (order) {
        indices = order.filter(o => o.si === si);
      } else {
        indices = sec.questions.map((_, qi) => ({ si, qi }));
      }
      return `
        <div class="section-title">
          <span class="badge">${sec.type}题</span> ${sec.label}
        </div>
        ${indices.map(({ qi }) => {
          const q = sec.questions[qi];
          qGlobal++;
          const qid = `p${pi}_s${si}_q${qi}`;
          if (sec.type === '单选') {
            return renderChoice(qid, qGlobal, q, pi, si, qi);
          } else if (sec.type === '判断') {
            return renderTF(qid, qGlobal, q, pi, si, qi);
          } else if (sec.type === '简答') {
            return renderShort(qid, qGlobal, q, pi, si, qi);
          } else {
            return renderFill(qid, qGlobal, q, pi, si, qi);
          }
        }).join('')}
      `;
    }).join('')}
  </div>`;
}

function renderChoice(qid, qGlobal, q, pi, si, qi) {
  const srcTag = q.source ? `<span class="q-source">${q.source}</span>` : '';
  return `<div class="q-card" id="card_${qid}" data-paper="${pi}" data-section="${si}" data-q="${qi}" data-type="choice">
    <div class="q-stem"><span class="q-num">${qGlobal}</span><span>${q.stem}${srcTag}</span></div>
    <div class="options">
      ${q.opts.map((opt, oi) => `
        <label class="opt-label" id="opt_${qid}_${oi}">
          <input type="radio" name="${qid}" value="${oi}">
          <span>${'ABCD'[oi]}. ${opt}</span>
        </label>
      `).join('')}
    </div>
    <div class="feedback" id="fb_${qid}"></div>
  </div>`;
}

function renderTF(qid, qGlobal, q, pi, si, qi) {
  const srcTag = q.source ? `<span class="q-source">${q.source}</span>` : '';
  return `<div class="q-card" id="card_${qid}" data-paper="${pi}" data-section="${si}" data-q="${qi}" data-type="tf">
    <div class="q-stem"><span class="q-num">${qGlobal}</span><span>${q.stem}${srcTag}</span></div>
    <div class="options">
      <label class="opt-label" id="opt_${qid}_0">
        <input type="radio" name="${qid}" value="true"> <span>A. 对</span>
      </label>
      <label class="opt-label" id="opt_${qid}_1">
        <input type="radio" name="${qid}" value="false"> <span>B. 错</span>
      </label>
    </div>
    <div class="feedback" id="fb_${qid}"></div>
  </div>`;
}

function renderFill(qid, qGlobal, q, pi, si, qi) {
  // Normalize: ____1____ → ____, ______ → ____
  let stem = q.stem.replace(/____\d+____/g, '____').replace(/______/g, '____');
  let blankIdx = 0;
  const stemWithInputs = stem.replace(/____/g, () => {
    const b = blankIdx++;
    return `<input type="text" class="fill-input" id="fill_${qid}_${b}" data-blank="${b}" placeholder="______">`;
  });
  const srcTag = q.source ? `<span class="q-source">${q.source}</span>` : '';
  return `<div class="q-card" id="card_${qid}" data-paper="${pi}" data-section="${si}" data-q="${qi}" data-type="fill">
    <div class="q-stem"><span class="q-num">${qGlobal}</span><span>${stemWithInputs}${srcTag}</span></div>
    <div class="feedback" id="fb_${qid}"></div>
  </div>`;
}

// ========================  GRADING  ========================

function gradeCurrent() {
  const globalIdx = getGlobalPaperIdx(currentSubject, currentPaper);
  const paper = papers[globalIdx];
  wrongCards = [];  // clear previous paper's wrong cards
  wrongIdx = 0;
  let totalScore = 0;
  let earnedScore = 0;

  paper.sections.forEach((sec, si) => {
    sec.questions.forEach((q, qi) => {
      const qid = `p${globalIdx}_s${si}_q${qi}`;
      const card = document.getElementById(`card_${qid}`);
      const fb = document.getElementById(`fb_${qid}`);
      if (!card || !fb) return;

      let isCorrect = false;
      let correctDisplay = '';

      if (sec.type === '简答') {
        // Short answer: self-grade, not counted in score
        card.classList.add('checked');
        fb.innerHTML = '<div class="exp-box">📝 <strong>参考答案：</strong>' + (q.exp || '暂无') + '</div>';
        fb.className = 'feedback';
        fb.style.display = 'block';
        // Skip score tracking for this question
      } else {
        totalScore += sec.scoreEach;
      }

      if (sec.type === '单选') {
        const selected = document.querySelector(`input[name="${qid}"]:checked`);
        if (selected && parseInt(selected.value) === q.ans) {
          isCorrect = true;
          earnedScore += sec.scoreEach;
        }
        correctDisplay = 'ABCD'[q.ans] + '. ' + q.opts[q.ans];
        // Highlight chosen & real answer
        q.opts.forEach((_, oi) => {
          const lbl = document.getElementById(`opt_${qid}_${oi}`);
          if (lbl) lbl.classList.remove('chosen-correct','chosen-wrong','real-answer');
        });
        if (selected) {
          const selLbl = document.getElementById(`opt_${qid}_${selected.value}`);
          if (selLbl) selLbl.classList.add(isCorrect ? 'chosen-correct' : 'chosen-wrong');
        }
        if (!isCorrect) {
          const realLbl = document.getElementById(`opt_${qid}_${q.ans}`);
          if (realLbl) realLbl.classList.add('real-answer');
        }
      } else if (sec.type === '判断') {
        const selected = document.querySelector(`input[name="${qid}"]:checked`);
        const userVal = selected ? (selected.value === 'true') : null;
        if (userVal === q.ans) {
          isCorrect = true;
          earnedScore += sec.scoreEach;
        }
        correctDisplay = q.ans ? 'A. 对' : 'B. 错';
        ['0','1'].forEach(vi => {
          const lbl = document.getElementById(`opt_${qid}_${vi}`);
          if (lbl) lbl.classList.remove('chosen-correct','chosen-wrong','real-answer');
        });
        if (selected) {
          const selLbl = document.getElementById(`opt_${qid}_${selected.value === 'true' ? '0' : '1'}`);
          if (selLbl) selLbl.classList.add(isCorrect ? 'chosen-correct' : 'chosen-wrong');
        }
        if (!isCorrect) {
          const realLbl = document.getElementById(`opt_${qid}_${q.ans ? '0' : '1'}`);
          if (realLbl) realLbl.classList.add('real-answer');
        }
      } else if (sec.type === '填空') {
        // Check each blank
        let allBlanksCorrect = true;
        const correctParts = [];
        for (let b = 0; b < q.blanks; b++) {
          const input = document.getElementById(`fill_${qid}_${b}`);
          const accepted = q.ans[b] || [];
          const userAnswer = input ? input.value.trim() : '';
          const blankCorrect = accepted.some(a => userAnswer.toLowerCase() === a.toLowerCase());
          if (!blankCorrect) allBlanksCorrect = false;
          if (input) {
            input.classList.remove('input-correct','input-wrong');
            input.classList.add(blankCorrect ? 'input-correct' : 'input-wrong');
          }
          correctParts.push(accepted[0]); // show first accepted answer
        }
        if (allBlanksCorrect) {
          isCorrect = true;
          earnedScore += sec.scoreEach;
        }
        correctDisplay = correctParts.join('、');
      }

      // Update card & feedback (skip 简答 - handled inline)
      if (sec.type !== '简答') {
        card.classList.remove('correct','wrong','checked');
        card.classList.add('checked', isCorrect ? 'correct' : 'wrong');
        if (isCorrect) {
          fb.innerHTML = '✅ 回答正确！';
          fb.className = 'feedback correct-msg';
        } else {
          fb.innerHTML = `❌ 回答错误，正确答案：<span class="correct-answer-text">${correctDisplay}</span>`;
          fb.className = 'feedback wrong-msg';
        }
        if (q.exp) {
          fb.innerHTML += `<div class="exp-box">💡 ${q.exp}</div>`;
        }
        // Collect wrong cards
        if (!isCorrect) wrongCards.push(`card_${qid}`);
      }
    });
  });

  // Show score
  document.getElementById('scoreText').style.display = 'block';
  document.getElementById('scoreHint').style.display = 'none';
  document.getElementById('scoreNum').textContent = earnedScore;
  document.getElementById('scoreTotal').textContent = totalScore;

  // Show/hide wrong-nav button
  wrongIdx = 0;
  const btnW = document.getElementById('btnWrong');
  if (wrongCards.length > 0) {
    btnW.style.display = '';
    btnW.textContent = `📍 定位错题 (1/${wrongCards.length})`;
  } else {
    btnW.style.display = 'none';
  }

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========================  SCROLL TO WRONG  ========================

function scrollToWrong() {
  if (wrongCards.length === 0) return;
  const id = wrongCards[wrongIdx];
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.boxShadow = '0 0 0 4px #f59e0b';
    setTimeout(() => { el.style.boxShadow = ''; }, 1500);
  }
  wrongIdx = (wrongIdx + 1) % wrongCards.length;
  const btn = document.getElementById('btnWrong');
  if (btn) btn.textContent = `📍 下一错题 (${wrongIdx + 1}/${wrongCards.length})`;
}

// ========================  RESET  ========================

function resetPaper() {
  const globalIdx = getGlobalPaperIdx(currentSubject, currentPaper);
  delete shuffleMap[globalIdx];
  wrongCards = [];
  wrongIdx = 0;
  document.getElementById("btnWrong").style.display = "none";
  const paperDiv = document.getElementById(`paper${globalIdx}`);
  if (paperDiv) {
    paperDiv.outerHTML = renderPaper(globalIdx);
  }
  // Hide score
  document.getElementById('scoreText').style.display = 'none';
  document.getElementById('scoreHint').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========================  SHUFFLE  ========================

function shufflePaper() {
  const globalIdx = getGlobalPaperIdx(currentSubject, currentPaper);
  const paper = papers[globalIdx];
  const order = [];
  paper.sections.forEach((sec, si) => {
    // Create array of indices for this section
    const indices = sec.questions.map((_, qi) => ({ si, qi }));
    // Fisher-Yates shuffle
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    order.push(...indices);
  });
  shuffleMap[globalIdx] = order;
  const paperDiv = document.getElementById(`paper${globalIdx}`);
  if (paperDiv) {
    paperDiv.outerHTML = renderPaper(globalIdx);
  }
  // Hide score
  document.getElementById('scoreText').style.display = 'none';
  document.getElementById('scoreHint').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========================  TAB SWITCH  ========================

function switchSubject(subj) {
  currentSubject = subj;
  currentPaper = 0;
  wrongCards = [];
  wrongIdx = 0;
  document.getElementById("btnWrong").style.display = "none";
  document.getElementById("scoreText").style.display = "none";
  document.getElementById("scoreHint").style.display = "block";
  renderSubjectBar();
  renderTabBar();
  renderContainer();
  // Activate first paper of this subject
  switchPaper(0);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function switchPaper(idx) {
  currentPaper = idx;
  document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", i === idx));
  const globalIdx = getGlobalPaperIdx(currentSubject, idx);
  document.querySelectorAll(".paper").forEach((p, i) => p.classList.toggle("active", i === globalIdx));
  document.getElementById("scoreText").style.display = "none";
  document.getElementById("scoreHint").style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ========================  INIT  ========================

window.onerror = function(msg, url, line) {
  document.body.innerHTML = '<div style="padding:30px;color:red;font-family:monospace"><h2>JS Error</h2><pre>' + msg + '</pre><p>Line: ' + line + '</p></div>' + document.body.innerHTML;
};
try {
  renderAll();
} catch(e) {
  document.body.innerHTML = '<div style="padding:30px;color:red"><h2>渲染错误</h2><pre>' + e.message + '</pre><pre>' + (e.stack||'') + '</pre></div>' + document.body.innerHTML;
}
